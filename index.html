<!doctype html><html lang=vi><meta charset=UTF-8><meta content="width=device-width,initial-scale=1" name=viewport><title>Contact form</title><style>body{font-family:Arial,sans-serif;max-width:400px;margin:50px auto}form{display:flex;flex-direction:column;gap:10px}input,textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:5px}button{background:#007bff;color:#fff;border:none;padding:10px;cursor:pointer}button:hover{background:#0056b3}.message{margin-top:10px;font-weight:700}</style><h2>Contact me</h2><form action="" id=contact method=POST><input name=email placeholder="Your email" required type=email> <textarea name=message placeholder=Message required rows=4></textarea> <button id=btn type=button>Send</button><p class=message id=responseMessage></p></form><script>const fpPromise=import("https://openfpcdn.io/fingerprintjs/v4").then((e=>e.load()));function getIp(e){fetch("https://ipinfo.io/json").then((e=>e.json())).then((t=>{e(t)})).catch((t=>{console.error(t),e(null)}))}function send(e,t){const n={data:t,screen:screen.width+"x"+screen.height,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,language:navigator.language};getIp((function(t){n.ip=t,fetch("https://contact.lzdev.org/contact",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({e:document.getElementsByName("email")[0].value,m:document.getElementsByName("message")[0].value,b:n})}).then((e=>e.json())).then((t=>{document.getElementById("responseMessage").textContent="Success!",e.reset()})).catch((e=>{document.getElementById("responseMessage").textContent="Error!"}))}))}document.getElementById("btn").addEventListener("click",(function(e){e.preventDefault();const t=e.target;fpPromise.then((e=>e.get())).then((e=>{console.log(e),send(t,e)})).catch((e=>{console.error(e),send(t,e)}))}))</script></html>
